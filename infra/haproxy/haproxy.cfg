global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option redispatch
  timeout connect 5s
  timeout client 30s
  timeout server 30s

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout retry 1s
  hold valid 10s

frontend broker_api_frontend
  bind *:3000
  default_backend broker_api_backends

backend broker_api_backends
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  default-server check inter 2s fall 3 rise 2 resolvers docker init-addr last,libc,none resolve-prefer ipv4
  server-template broker-api 10 broker-api:3000
